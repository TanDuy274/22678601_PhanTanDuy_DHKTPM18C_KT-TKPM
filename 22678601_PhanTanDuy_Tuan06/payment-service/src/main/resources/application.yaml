spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:mariadb://localhost:3306/payment_db?allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: sapassword
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8084

