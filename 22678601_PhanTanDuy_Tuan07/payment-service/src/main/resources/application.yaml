server:
  port: 8084

spring:
  application:
    name: payment-service

  # MariaDB Configuration
  datasource:
    url: jdbc:mariadb://localhost:3306/payment_db
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  rabbitmq:
    host: 172.20.35.147
    port: 5672
    username: guest
    password: guest

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://172.20.35.147:8761/eureka/